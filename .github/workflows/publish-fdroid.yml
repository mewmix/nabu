name: Publish to F-Droid Repo

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        if: ${{ env.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      - name: Build Release APK
        run: ./gradlew app:assembleRelease --no-daemon
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      # Fallback: Build Debug APK if secrets are missing (for testing the pipeline)
      - name: Build Debug APK (Fallback)
        if: ${{ env.RELEASE_KEYSTORE_BASE64 == '' && failure() }}
        run: ./gradlew app:assembleDebug --no-daemon

      - name: Setup F-Droid Server
        run: |
          sudo apt-get update
          sudo apt-get install -y fdroidserver
          # Initialize a new repo configuration
          fdroid init --verbose

      - name: Copy APK to Repo
        run: |
          # Copy release APK if it exists, otherwise debug
          if [ -f app/build/outputs/apk/release/*.apk ]; then
            cp app/build/outputs/apk/release/*.apk repo/
          else
            cp app/build/outputs/apk/debug/*.apk repo/
          fi

      - name: Update F-Droid Index
        run: |
          # We use --create-metadata to generate metadata for the new APK
          fdroid update --create-metadata --pretty --verbose
          
          # NOTE: For a persistent repo signing key, you should add a step here to
          # import your repo-key.keystore similar to the app signing key.
          # For now, 'fdroid init' generated a temporary one.

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          force_orphan: true
